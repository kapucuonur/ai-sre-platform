services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-sre-backend
    ports:
      - "8003:8000"
    volumes:
      - ./backend/data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock # Allows managing host docker containers
    environment:
      - PYTHONUNBUFFERED=1
      - SRE_DB_DIR=/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai-sre-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

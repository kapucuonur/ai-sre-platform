services:
  platform:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-sre-platform
    ports:
      - "8003:8000"
      - "8080:8000"
    volumes:
      - ./backend/data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - PYTHONUNBUFFERED=1
      - SRE_DB_DIR=/app/data
    restart: unless-stopped
